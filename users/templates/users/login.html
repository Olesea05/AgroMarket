{% extends 'products/base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 480px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title mb-4 text-center">Вход в аккаунт</h2>

            {% if messages %}
                <div class="mb-3">
                    {% for message in messages %}
                        <div class="alert alert-warning" role="alert">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="id_email">Email</label>
                    <input id="id_email" type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="id_password">Пароль</label>
                    <input id="id_password" type="password" name="password" class="form-control" required>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-olive">Войти</button>
                </div>
            </form>

            <p class="mt-3 text-center">Нет аккаунта? <a href="{% url 'register' %}" class="link-olive">Зарегистрироваться</a></p>
        </div>
    </div>
</div>
{% endblock %}
